name: Cuttlefish CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package_macos:
        description: Build and upload the macOS app artifact
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  CI: "true"
  NODE_VERSION: "22"

jobs:
  web-landing:
    name: Web landing quality
    runs-on: [self-hosted, cuttlefish, macOS, pdf-viewer]
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run Playwright e2e tests
        run: npm run test:e2e

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: paperview-landing-dist
          path: dist
          if-no-files-found: error
          retention-days: 14

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  macos-app:
    name: macOS app validation
    runs-on: [self-hosted, cuttlefish, macOS, pdf-viewer]
    timeout-minutes: 75

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show host toolchain
        run: |
          sw_vers
          xcodebuild -version
          node --version || true
          ruby --version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install JS dependencies
        working-directory: PDFViewer
        run: npm ci

      - name: Install macOS CocoaPods
        working-directory: PDFViewer
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3
          bundle exec pod install --project-directory=macos

      - name: Lint, unit test, typecheck, and native XCTest
        working-directory: PDFViewer
        run: npm run validate

      - name: Build macOS UI test bundle
        working-directory: PDFViewer
        run: npm run macos:ui-build

      - name: Run macOS UI e2e tests
        working-directory: PDFViewer
        run: npm run e2e:macos

  package-macos:
    name: Package macOS artifact
    needs:
      - web-landing
      - macos-app
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.package_macos)
    runs-on: [self-hosted, cuttlefish, macOS, pdf-viewer]
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install JS dependencies
        working-directory: PDFViewer
        run: npm ci

      - name: Install macOS CocoaPods
        working-directory: PDFViewer
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3
          bundle exec pod install --project-directory=macos

      - name: Package Release app
        working-directory: PDFViewer
        env:
          ARCHS: ${{ runner.arch == 'ARM64' && 'arm64' || 'x86_64' }}
          ONLY_ACTIVE_ARCH: "YES"
        run: npm run package:macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFViewer-macOS-${{ github.ref_name }}
          path: |
            PDFViewer/dist/macos/PDFViewer-macOS-Release.zip
            PDFViewer/dist/macos/PDFViewer-macOS-Release.zip.sha256
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish GitHub release assets
    needs: package-macos
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, cuttlefish, macOS, pdf-viewer]
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: PDFViewer-macOS-${{ github.ref_name }}
          path: release-artifacts

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          mapfile -t assets < <(find release-artifacts -type f -print | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" --title "$tag" --generate-notes
          fi
