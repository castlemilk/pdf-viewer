syntax = "proto3";

package acacia.pro.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/benebsworth/acacia/backend/pro/gen/acacia/pro/v1;prov1";

enum Plan {
  PLAN_UNSPECIFIED = 0;
  PLAN_FREE = 1;
  PLAN_PRO = 2;
}

enum EntitlementSource {
  ENTITLEMENT_SOURCE_UNSPECIFIED = 0;
  ENTITLEMENT_SOURCE_DEFAULT = 1;
  ENTITLEMENT_SOURCE_ADMIN = 2;
  ENTITLEMENT_SOURCE_APP_STORE = 3;
}

message AccountEntitlement {
  string firebase_uid = 1;
  string email = 2;
  Plan plan = 3;
  bool active = 4;
  int64 storage_quota_bytes = 5;
  int64 storage_used_bytes = 6;
  string customer_id = 7;
  string app_store_original_transaction_id = 8;
  EntitlementSource source = 9;
  google.protobuf.Timestamp updated_at = 10;
  google.protobuf.Timestamp expires_at = 11;
  repeated string features = 12;
  string app_account_token = 13;
}

message CloudPdfRect {
  int32 x_milli = 1;
  int32 y_milli = 2;
  int32 width_milli = 3;
  int32 height_milli = 4;
}

message CloudPdfPoint {
  int32 x_milli = 1;
  int32 y_milli = 2;
}

message CloudDocument {
  string id = 1;
  string title = 2;
  string author = 3;
  int32 page_count = 4;
  int64 size_bytes = 5;
  int32 progress_milli = 6;
  string created_at = 7;
  string modified_at = 8;
  string last_opened_at = 9;
  repeated string tags = 10;
  repeated string collection_ids = 11;
  bool favorite = 12;
  bool shared = 13;
  string thumbnail_tone = 14;
  string version_label = 15;
  int64 revision = 16;
}

message CloudAnnotation {
  string id = 1;
  string document_id = 2;
  int32 page_index = 3;
  string kind = 4;
  string color = 5;
  CloudPdfRect bounds = 6;
  repeated CloudPdfPoint points = 7;
  string text = 8;
  string created_at = 9;
  string updated_at = 10;
  int64 revision = 11;
}

message CloudLibrarySnapshot {
  repeated CloudDocument documents = 1;
  repeated CloudAnnotation annotations = 2;
  int64 revision = 3;
  string updated_at = 4;
}

message GetAccountRequest {}

message GetAccountResponse {
  AccountEntitlement account = 1;
}

message GetPurchaseContextRequest {}

message GetPurchaseContextResponse {
  string app_account_token = 1;
  repeated string product_ids = 2;
  string bundle_id = 3;
}

message SyncAppStoreTransactionRequest {
  string signed_transaction_jws = 1;
}

message SyncAppStoreTransactionResponse {
  AccountEntitlement account = 1;
}

message SyncLibraryRequest {
  CloudLibrarySnapshot snapshot = 1;
}

message SyncLibraryResponse {
  CloudLibrarySnapshot snapshot = 1;
  AccountEntitlement account = 2;
}

message UploadDocumentContentRequest {
  string document_id = 1;
  bytes data = 2;
  string content_type = 3;
}

message UploadDocumentContentResponse {
  string document_id = 1;
  int64 size_bytes = 2;
  AccountEntitlement account = 3;
}

message DownloadDocumentContentRequest {
  string document_id = 1;
}

message DownloadDocumentContentResponse {
  string document_id = 1;
  bytes data = 2;
  string content_type = 3;
  int64 size_bytes = 4;
}

message UpsertEntitlementRequest {
  AccountEntitlement account = 1;
}

message UpsertEntitlementResponse {
  AccountEntitlement account = 1;
}

message ErrorResponse {
  string code = 1;
  string message = 2;
}
